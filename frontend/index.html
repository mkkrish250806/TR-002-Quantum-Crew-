<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Healthcare AI Support | Premium Intelligence System</title>

    <!-- 🔤 Premium Font System -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- 🎨 Icons (for UI polish: dashboard/chat icons etc.) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- ⚡ Preload performance optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* ===============================
         GLOBAL PREMIUM DESIGN BASE
      =============================== */

      html, body {
        margin: 0;
        padding: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: radial-gradient(circle at top, #0b1220, #020617 60%, #000);
        color: white;
        overflow-x: hidden;
      }

      /* Smooth rendering */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        box-sizing: border-box;
      }

      /* ===============================
         PREMIUM BACKGROUND SYSTEM
      =============================== */

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
      }

      /* Main glow layer */
      body::before {
        background:
          radial-gradient(circle at 15% 20%, rgba(14,165,233,0.18), transparent 40%),
          radial-gradient(circle at 85% 25%, rgba(168,85,247,0.14), transparent 45%),
          radial-gradient(circle at 50% 80%, rgba(34,197,94,0.10), transparent 50%);
        filter: blur(40px);
        opacity: 0.9;
      }

      /* Animated noise + depth layer */
      body::after {
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.05;
        mix-blend-mode: overlay;
      }

      /* ===============================
         FLOATING ORBS (ANIMATION LAYER)
      =============================== */

      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.25;
        z-index: -1;
        animation: float 12s ease-in-out infinite;
      }

      .orb.one {
        width: 300px;
        height: 300px;
        background: #0ea5e9;
        top: 10%;
        left: 10%;
      }

      .orb.two {
        width: 350px;
        height: 350px;
        background: #a855f7;
        bottom: 10%;
        right: 10%;
        animation-delay: 2s;
      }

      .orb.three {
        width: 250px;
        height: 250px;
        background: #22c55e;
        top: 60%;
        left: 40%;
        animation-delay: 4s;
      }

      @keyframes float {
        0% { transform: translateY(0px) translateX(0px) scale(1); }
        50% { transform: translateY(-20px) translateX(15px) scale(1.05); }
        100% { transform: translateY(0px) translateX(0px) scale(1); }
      }

      /* ===============================
         APP ROOT SMOOTHING
      =============================== */

      #root {
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      /* ===============================
         LOADING EXPERIENCE (FIRST PAINT)
      =============================== */

      .boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020617;
        z-index: 9999;
        animation: fadeOut 0.8s ease 1.2s forwards;
      }

      .boot-loader span {
        width: 10px;
        height: 10px;
        margin: 4px;
        background: #0ea5e9;
        border-radius: 50%;
        animation: bounce 1s infinite ease-in-out;
      }

      .boot-loader span:nth-child(2) { animation-delay: 0.2s; }
      .boot-loader span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); opacity: 0.5; }
        50% { transform: translateY(-10px); opacity: 1; }
      }

      @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
  </head>

  <body>

    <!-- 🌊 Animated background orbs -->
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>

    <!-- ⚡ Boot loader (premium app feel) -->
    <div class="boot-loader">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- React App -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
